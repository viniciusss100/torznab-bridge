services:
  torznab-bridge:
    image: ghcr.io/immatheushen/torznab-bridge:latest
    container_name: torznab-bridge
    restart: unless-stopped
    ports:
      - "9699:9699"
    environment:
      PORT: "9699"
      TORZNAB_SOURCES: betor,stremio
      TORZNAB_STREMIO_URL: https://torrentio.strem.fun/brazuca
      TORZNAB_BETOR_URL: https://catalogo.betor.top
      TORZNAB_BASE_URL: http://192.168.1.100:9699
      TORZNAB_CONFIGURATION: brazuca
      TORZNAB_RUNTIME_CONFIG_PATH: /config/torznab-ui.json
    volumes:
      - torznab_bridge_config:/config

volumes:
  torznab_bridge_config:
