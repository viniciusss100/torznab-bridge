services:
  torznab-bridge:
    image: ghcr.io/immatheushen/torznab-bridge:latest
    build:
      context: ./addon
      dockerfile: Dockerfile.torznab
    container_name: torznab-bridge
    restart: unless-stopped
    ports:
      - "${TORZNAB_PORT:-9699}:9699"
    environment:
      PORT: "9699"
      DATABASE_URI: "${DATABASE_URI:-}"
      TORZNAB_SOURCE: "${TORZNAB_SOURCE:-}"
      TORZNAB_SOURCES: "${TORZNAB_SOURCES:-betor,stremio}"
      TORZNAB_CONFIGURATION: "${TORZNAB_CONFIGURATION:-brazuca}"
      TORZNAB_STREMIO_URL: "${TORZNAB_STREMIO_URL:-https://torrentio.strem.fun/brazuca}"
      TORZNAB_BETOR_URL: "${TORZNAB_BETOR_URL:-https://catalogo.betor.top}"
      TORZNAB_BASE_URL: "${TORZNAB_BASE_URL:-http://192.168.1.100:9699}"
      TORZNAB_API_KEY: "${TORZNAB_API_KEY:-}"
      TORZNAB_DB_POOL_MAX: "${TORZNAB_DB_POOL_MAX:-10}"
      TORZNAB_RUNTIME_CONFIG_PATH: "/config/torznab-ui.json"
    volumes:
      - ./data:/config
